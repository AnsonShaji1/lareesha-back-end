<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f4f1ec;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f1ec;padding:40px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5dfd6;box-shadow:0 4px 24px rgba(44,36,28,0.06);">
          <tr>
            <td style="background:#5c4d3c;padding:26px 32px;text-align:center;">
              <p style="margin:0;font-size:12px;letter-spacing:0.28em;color:#e8dcc8;font-weight:600;text-transform:uppercase;">{{ brand_name }}</p>
              <p style="margin:8px 0 0;font-size:11px;color:rgba(232,220,200,0.75);font-weight:400;">{% block tagline %}{% endblock %}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 32px 28px;">
              {% block body %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:22px 32px;background:#faf8f6;border-top:1px solid #ebe6df;text-align:center;">
              <p style="margin:0;font-size:12px;color:#8a8278;line-height:1.6;">{% block footer_text %}{{ brand_name }}{% endblock %}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
